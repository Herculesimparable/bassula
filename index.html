<!DOCTYPE html>
<html lang="pt-AO">
  <head>
    <script>
      (function () {
        try {
          var manual = localStorage.getItem('bassula-locale-manual') === '1';
          var pref = localStorage.getItem('bassula-locale');
          if (manual && pref === 'pt') {
            document.documentElement.lang = 'pt-AO';
            return;
          }
          if (manual && pref === 'en') {
            document.documentElement.lang = 'en';
            return;
          }
        } catch (e) {}
        var list =
          navigator.languages && navigator.languages.length
            ? navigator.languages
            : [navigator.language || 'pt'];
        var pt = false;
        var en = false;
        for (var i = 0; i < list.length; i++) {
          var code = (list[i] || '').split('-')[0].toLowerCase();
          if (code === 'pt') pt = true;
          if (code === 'en') en = true;
        }
        document.documentElement.lang = pt ? 'pt-AO' : en ? 'en' : 'en';
      })();
    </script>
